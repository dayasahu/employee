# Employee service - bootstrap properties.
# All other config is pulled from configserver at startup
# (see SPRING_CONFIG_IMPORT=configserver:http://configserver:8071 in docker-compose).

# ----- Observability -----
# 100% trace sampling for dev. Lower this in prod.
management.tracing.sampling.probability=1.0

# OTLP HTTP endpoints. Defaults assume the otel-collector container on the
# `observability` docker network. Override per env via OTEL_*_ENDPOINT.
management.otlp.tracing.endpoint=${OTEL_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
management.otlp.metrics.export.url=${OTEL_METRICS_ENDPOINT:http://otel-collector:4318/v1/metrics}
management.otlp.logging.endpoint=${OTEL_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}

# Actuator: expose prometheus + standard observability endpoints.
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers,env,mappings
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Trace IDs in console logs (for humans + the log-agent regex parser).
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
